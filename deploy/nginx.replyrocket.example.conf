# Example TLS reverse proxy for ReplyRocket (Docker `app` on host port 3000).
#
# 1. Hostname: replyrocket.site (Let's Encrypt certs under that name).
# 2. Point ssl_certificate / ssl_certificate_key at real certs (Let's Encrypt).
# 3. Include this server block from `http {}` or symlink into sites-enabled.

upstream replyrocket_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name replyrocket.site;

    ssl_certificate     /etc/letsencrypt/live/replyrocket.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/replyrocket.site/privkey.pem;

    client_max_body_size 256k;

    location / {
        proxy_http_version 1.1;
        proxy_pass http://replyrocket_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

server {
    listen 80;
    server_name replyrocket.site;
    return 301 https://$host$request_uri;
}
